# ============================
# CRM Backend Configuration
# ============================

# Server
server.port=8081
server.servlet.context-path=/api

# Application
spring.application.name=crm-backend

# H2 Database
spring.datasource.url=jdbc:h2:mem:crmdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
app.jwt.secret=CRM_Super_Secret_Key_For_JWT_Token_Generation_2024_Must_Be_At_Least_256_Bits_Long
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# Logging
logging.level.com.crm=DEBUG
logging.level.org.springframework.security=INFO
