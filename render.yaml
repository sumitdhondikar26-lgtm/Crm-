services:
  # The Database (Optional, but if you want PostgreSQL)
  # - type: psql
  #   name: crm-postgres
  #   plan: free

  # The Spring Boot Backend
  - type: web
    name: crm-backend
    env: docker
    region: ohio
    plan: free
    dockerContext: ./crm-backend
    dockerfilePath: ./crm-backend/Dockerfile
    envVars:
      - key: PORT
        value: 8080
      # Use this below if you activate the PostgreSQL above and change application.properties for PG
      # - key: SPRING_DATASOURCE_URL
      #   fromDatabase:
      #     name: crm-postgres
      #     property: connectionString

  # The React Frontend
  - type: web
    name: crm-frontend
    env: static
    region: ohio
    plan: free
    buildCommand: cd crm-frontend && npm install && npm run build
    staticPublishPath: ./crm-frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: crm-backend
          envVarKey: RENDER_EXTERNAL_URL
        # This appends /api to the exact URL generated by Render for the backend
        sync: false
    # Rewrite rules for React Router SPA (Single Page Applications)
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
